services:
  - type: web
    name: trading-platform
    runtime: node
    plan: free
    buildCommand: npm install && cd frontend && npm install && npm run build && cd .. && rm -rf public && cp -r frontend/dist public
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
