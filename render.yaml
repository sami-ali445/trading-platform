services:
  - type: web
    name: trading-platform
    runtime: node
    plan: free
    buildCommand: npm install && cd frontend && npm install && npm run build && cd .. && rm -rf public/assets/* && cp -r frontend/dist/assets/* public/assets/ && cp frontend/dist/index.html public/index.html
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: "https://trading-platform-iglr.onrender.com"
      - key: FORCE_REBUILD
        value: "2026-06-21T01"
