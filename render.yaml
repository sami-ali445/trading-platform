services:
  - type: web
    name: trading-platform
    runtime: node
    plan: free
    buildCommand: npm install && cd frontend && npm install && npm run build && cd .. && cp -r frontend/dist/* public/
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: trading-db
          property: connectionString

databases:
  - name: trading-db
    plan: free
    databaseName: trading_platform
    ipAllowList: []
