services:
  - type: web
    name: trading-platform
    runtime: node
    plan: free
    buildCommand: echo "Using pre-built frontend"
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: "https://trading-platform-iglr.onrender.com"
      - key: FORCE_REBUILD
        value: "2026-06-21T01"
